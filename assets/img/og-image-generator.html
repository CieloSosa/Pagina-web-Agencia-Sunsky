<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px; height: 630px; overflow: hidden;
      background: #0B0910;
      font-family: 'Montserrat', sans-serif;
      display: flex; align-items: center;
    }
    .bg-glow {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 80% at 10% 50%, rgba(157,143,232,.25) 0%, transparent 55%),
        radial-gradient(ellipse 50% 60% at 90% 20%, rgba(255,92,138,.15) 0%, transparent 50%);
    }
    .content {
      position: relative; z-index: 2;
      padding: 64px 80px;
      display: flex; flex-direction: column; justify-content: center;
      height: 100%;
    }
    .logo-row {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 40px;
    }
    .logo-img { width: 52px; height: 52px; border-radius: 12px; }
    .logo-name {
      font-size: 1.8rem; font-weight: 900;
      color: #fff; letter-spacing: -0.5px;
    }
    .logo-name em { color: #9d8fe8; font-style: normal; }
    h1 {
      font-size: 3.8rem; font-weight: 900;
      color: #fff; line-height: 1.05;
      letter-spacing: -1.5px;
      margin-bottom: 20px;
      max-width: 800px;
    }
    h1 em { color: #9d8fe8; font-style: normal; }
    .sub {
      font-size: 1.25rem; color: rgba(255,255,255,.6);
      font-weight: 500; max-width: 600px;
      line-height: 1.5;
    }
    .badges {
      display: flex; gap: 12px; margin-top: 32px;
    }
    .badge {
      background: rgba(157,143,232,.15);
      border: 1px solid rgba(157,143,232,.3);
      border-radius: 40px;
      padding: 6px 16px;
      font-size: .85rem; font-weight: 600;
      color: #c5bbf0;
    }
    .domain {
      position: absolute; bottom: 40px; right: 80px;
      font-size: .9rem; color: rgba(255,255,255,.3);
      font-weight: 600;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-glow"></div>
  <div class="content">
    <div class="logo-row">
      <img src="logo-icono.png" class="logo-img" alt="Sunsky">
      <span class="logo-name">Sun<em>sky</em></span>
    </div>
    <h1>Redes que venden.<br><em>Resultados</em> que importan.</h1>
    <p class="sub">Community manager, diseño gráfico y publicidad pagada para negocios que quieren crecer.</p>
    <div class="badges">
      <span class="badge">Community Manager</span>
      <span class="badge">Meta Ads</span>
      <span class="badge">Diseño Gráfico</span>
      <span class="badge">Bariloche, Argentina</span>
    </div>
  </div>
  <span class="domain">agenciasunsky.com</span>
</body>
</html>
