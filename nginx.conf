server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Redirige /index.html → /
    rewrite ^/index\.html$ / permanent;

    # Redirige /pagina.html → /pagina
    rewrite ^/(.+)\.html$ /$1 permanent;

    # Rutas de secciones del home → sirven index.html
    location = /planes   { try_files /index.html =404; }
    location = /nosotros { try_files /index.html =404; }
    location = /faq      { try_files /index.html =404; }
    location = /blog     { try_files /index.html =404; }

    # Artículos del blog (subdirectorio)
    location /blog/ {
        try_files $uri $uri.html $uri/ =404;
    }

    # Todo lo demás: archivo exacto → .html → carpeta
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    gzip on;
    gzip_types text/html text/css application/javascript image/png image/svg+xml;
}
